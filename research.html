<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Archive | Portofolio Akademik</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<style>
    /* style.css */
:root {
    --bg-dark: #0f172a;
    --primary-blue: #3b82f6;
    --primary-purple: #8b5cf6;
    --text-light: #f8fafc;
    --glass: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-dark);
    color: var(--text-light);
    line-height: 1.6;
    overflow-x: hidden;
}

/* Background Glow Effect */
.background-glow {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
    z-index: -1;
}

header {
    text-align: center;
    padding: 80px 20px 40px;
}

header h1 {
    font-size: 3rem;
    font-weight: 800;
    background: linear-gradient(to right, var(--primary-blue), var(--primary-purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -1px;
}

header p {
    color: #94a3b8;
    margin-top: 10px;
    font-weight: 300;
}

/* Grid Layout */
.grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 25px;
    padding: 40px;
    max-width: 1200px;
    margin: 0 auto;
}

/* Card Style (Glassmorphism) */
.card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 25px;
    backdrop-filter: blur(10px);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    overflow: hidden;
}

.card:hover {
    transform: translateY(-10px);
    border-color: var(--primary-blue);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.card h3 {
    margin-bottom: 12px;
    font-size: 1.25rem;
    color: #fff;
}

.card .tag {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    text-transform: uppercase;
    font-weight: 600;
    background: rgba(59, 130, 246, 0.1);
    color: var(--primary-blue);
    margin-bottom: 15px;
}

/* Animasi Fade In */
.fade-in { animation: fadeIn 1s ease-out; }
.fade-in-delay { animation: fadeIn 1.5s ease-out; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Tambahkan ini ke style.css */
.view-link {
    color: var(--primary-purple);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.3s ease;
    display: inline-block;
}

.view-link:hover {
    color: var(--primary-blue);
    transform: translateX(5px);
}

/* Memastikan kartu memiliki tinggi yang sama dalam satu baris */
.card {
    display: flex;
    flex-direction: column;
    height: 100%;
}

</style>
<body>

    <div class="background-glow"></div>

    <header>
        <h1 class="fade-in">Research Archive</h1>
        <p class="fade-in-delay">Koleksi komprehensif hasil observasi, studi, dan karya ilmiah.</p>
    </header>

    <main id="research-container" class="grid-container">
        </main>

        <footer style="text-align: center; padding: 40px 20px; color: #64748b; font-size: 0.9rem;">
            &copy; 2024 Muaz Al Baihaqi - Portofolio Akademik. All rights reserved.
        </footer>
    <script>

        // Fungsi untuk mengambil data dari file JSON
async function loadResearchData() {
    const container = document.getElementById('research-container');
    
    try {
        // Ganti 'data.json' dengan URL link JSON kamu jika berada di server berbeda
        const response = await fetch('https://api.npoint.io/7fc8e8539765736aa2a1');
        
        if (!response.ok) {
            throw new Error('Gagal memuat data penelitian');
        }

        const researchData = await response.json();
        
        // Bersihkan kontainer sebelum mengisi (opsional)
        container.innerHTML = '';

        researchData.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'card fade-in';
            
            // Animasi muncul berurutan (staggered)
            card.style.animationDelay = `${index * 0.15}s`;

            card.innerHTML = `
                <span class="tag">${item.type}</span>
                <p style="font-size: 0.8rem; color: #64748b; margin-bottom: 5px;">Tahun: ${item.year}</p>
                <h3>${item.title}</h3>
                <p style="font-size: 0.9rem; color: #94a3b8; margin-bottom: 20px;">${item.desc}</p>
                <div style="margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
                    <a href="${item.link}" target="_blank" class="view-link">Lihat Detail Penelitian →</a>
                </div>
            `;
            container.appendChild(card);
        });

    } catch (error) {
        console.error('Error:', error);
        container.innerHTML = `<p style="color: #ef4444; text-align: center; grid-column: 1/-1;">Gagal memuat data: ${error.message}</p>`;
    }
}

// Jalankan fungsi saat halaman dimuat
document.addEventListener('DOMContentLoaded', loadResearchData);

    </script>
</body>
</html>
