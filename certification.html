<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Professional Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; 
            --secondary: #a855f7;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a, #000000);
            color: white;
            min-height: 100vh;
            padding: 50px 20px;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        header h1 {
            font-size: 3rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        header p { color: #94a3b8; font-size: 1.1rem; }

        #certificate-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.4s ease;
            opacity: 0;
            transform: translateY(30px);
        }

        .card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .card:hover {
            border-color: var(--secondary);
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.3);
        }

        .img-container {
            width: 100%;
            height: 200px;
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }

        .card-content { padding: 25px; }

        .category-badge {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            font-size: 10px;
            padding: 5px 14px;
            border-radius: 50px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 15px;
        }

        .card-title { font-size: 1.3rem; margin-bottom: 8px; color: #fff; }

        .card-meta { color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px; }

        .btn-action {
            display: block;
            text-align: center;
            padding: 12px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-action:hover { filter: brightness(1.2); }

        #loader {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: var(--secondary);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>My Certifications</h1>
        <p>Webinar, Course, and Achievements</p>
    </header>

    <div id="loader">Sedang mengambil data dari npoint...</div>
    <div id="certificate-grid"></div>
</div>

<script>
    const NPOINT_URL = 'https://api.npoint.io/07e56527da1402746025';

    async function fetchCertificates() {
        const grid = document.getElementById('certificate-grid');
        const loader = document.getElementById('loader');

        try {
            // Tambahkan timestamp agar browser tidak mengambil data lama (cache)
            const response = await fetch(NPOINT_URL + '?nocache=' + new Date().getTime());
            const data = await response.json();
            
            console.log("Data diterima:", data); // Intip di F12 Console

            let certificates = Array.isArray(data) ? data : (data.certificates || []);

            if (certificates.length === 0) {
                loader.innerHTML = "⚠️ Data kosong atau format JSON salah di npoint.";
                return;
            }

            loader.style.display = 'none';
            grid.innerHTML = ''; 

            certificates.forEach((cert, index) => {
                // Menghapus baris baru atau spasi aneh di link gambar
                const cleanImage = cert.image ? cert.image.replace(/\s/g, '') : '';
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="img-container">
                        <img src="${cleanImage}" alt="${cert.title}" onerror="this.src='https://via.placeholder.com/400x250?text=Gambar+Tidak+Ditemukan'">
                    </div>
                    <div class="card-content">
                        <span class="category-badge">${cert.category || 'Certification'}</span>
                        <h3 class="card-title">${cert.title || 'Untitled'}</h3>
                        <p class="card-meta">${cert.issuer || ''} • ${cert.date || ''}</p>
                        <a href="${cert.link || '#'}" target="_blank" class="btn-action">Lihat Kredensial</a>
                    </div>
                `;
                grid.appendChild(card);
                setTimeout(() => card.classList.add('visible'), index * 150);
            });

        } catch (error) {
            console.error("Error Detail:", error);
            loader.innerHTML = "❌ Gagal koneksi ke npoint. Pastikan link API benar.";
        }
    }

    document.addEventListener('DOMContentLoaded', fetchCertificates);
</script>

</body>
</html>
